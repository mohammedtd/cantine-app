<!-- Toast global -->
<app-toast></app-toast>

<!-- Si pas connecté → redirection gérée par AuthGuard -->
<!-- Si connecté → navbar + page -->

@if (estConnecte && showNavbar) {
  <nav class="navbar-kiosque">
    <div class="navbar-kiosque-inner">

      <div class="d-flex align-items-center gap-3"
           style="cursor: pointer;"
           [routerLink]="['/accueil']">
        <div class="kiosque-logo-nav">
          <i class="bi bi-egg-fried"></i>
        </div>
        <div>
          <h1 class="navbar-brand-title">CantineApp</h1>
          <p class="navbar-brand-sub">Système de gestion de cantine</p>
        </div>
      </div>

      <div class="navbar-links">
        <a class="navbar-link"
           [class.active]="isActive('menu')"
           [routerLink]="['/menu']">
          <i class="bi bi-journal-text"></i>
          <span>Menu</span>
        </a>
        <a class="navbar-link"
           [class.active]="isActive('reservation')"
           [routerLink]="['/reservation']">
          <i class="bi bi-calendar-check"></i>
          <span>Réservation</span>
        </a>
        <a class="navbar-link"
           [class.active]="isActive('compte')"
           [routerLink]="['/compte']">
          <i class="bi bi-person-circle"></i>
          <span>Mon compte</span>
        </a>
      </div>

      <div class="d-flex align-items-center gap-4">
        <div class="navbar-time">
          <div class="navbar-heure">{{ heure }}</div>
          <div class="navbar-date">{{ date }}</div>
        </div>
        <div class="navbar-user">
          <i class="bi bi-person-circle" style="color: #E8001C;"></i>
          <span>{{ utilisateur?.nom }}</span>
          <button class="btn-deconnexion" (click)="seDeconnecter()" title="Se déconnecter">
            <i class="bi bi-box-arrow-right"></i>
          </button>
        </div>
      </div>

    </div>
  </nav>
}

<!-- Contenu de la page via le router -->
<router-outlet></router-outlet>
